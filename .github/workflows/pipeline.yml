name: BrandPulse Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install frontend
      run: |
        cd client
        npm install

    - name: Build frontend
      run: |
        cd client
        npm run build

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install backend
      run: pip install -r requirements.txt
